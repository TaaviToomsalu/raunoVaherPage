name: Deploy Rauno Vaher Page

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server host
        run: |
          ssh-keyscan -H 45.32.152.152 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 taavi@45.32.152.152 '
            cd /var/www/raunoVaherPage &&
            git pull &&
            docker-compose up -d --build
          '
